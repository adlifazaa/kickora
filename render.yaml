services:
  - type: web
    name: kickora-backend-proxy
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: API_FOOTBALL_KEY
        sync: false
      - key: PORT
        value: "8080"
      - key: TRUST_PROXY
        value: "true"
      - key: RATE_LIMIT_MAX
        value: "120"
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: NOTIFICATIONS_ENABLED
        value: "true"
      - key: NOTIFICATIONS_DRY_RUN
        value: "true"
      - key: NOTIFICATIONS_POLL_SECONDS
        value: "120"
      - key: NOTIFICATIONS_MAX_EVENT_CALLS
        value: "15"
      - key: USAGE_DAILY_THRESHOLD
        value: "6000"
      - key: USAGE_PROTECTION_POLL_SECONDS
        value: "300"
      - key: NOTIFICATIONS_DEDUP_TTL_SECONDS
        value: "21600"
      - key: NOTIFICATIONS_DRY_RUN_LOG_MAX
        value: "200"
